name: Lint Agent Files

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.sh"
      - "schemas/**"
      - "scripts/**"
      - "!examples/**"
      - "!integrations/**"

jobs:
  lint:
    name: Validate agent frontmatter and structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed agent files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.md' ':!examples/*' ':!integrations/*' ':!*.github/*')
          {
            echo "files<<ENDOFLIST"
            echo "$FILES"
            echo "ENDOFLIST"
          } >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "No agent files changed."
          else
            echo "Changed files:"
            echo "$FILES"
          fi

      - name: Run agent linter
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          chmod +x scripts/lint-agents.sh
          ./scripts/lint-agents.sh $CHANGED_FILES

      - name: Check agent originality
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          chmod +x scripts/check-agent-originality.sh
          ./scripts/check-agent-originality.sh $CHANGED_FILES

  check-index:
    name: Verify AGENTS.json is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check AGENTS.json staleness
        run: |
          chmod +x scripts/generate-index.sh
          ./scripts/generate-index.sh --check

  integration:
    name: Integration tests (convert + search + create-agent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run search (stats + categories)
        run: |
          chmod +x scripts/search-agents.sh
          ./scripts/search-agents.sh --stats
          ./scripts/search-agents.sh --list-categories | head -5

      - name: Run create-agent (CLI mode)
        run: |
          chmod +x scripts/create-agent.sh
          ./scripts/create-agent.sh --name "Test Agent" --category testing --emoji "🧪" --color "teal" --description "Test agent for CI validation"
          ./scripts/lint-agents.sh testing/testing-test-agent.md
          rm testing/testing-test-agent.md
          echo "create-agent.sh: OK"

      - name: Verify integrations are up to date
        run: |
          chmod +x scripts/convert.sh
          ./scripts/convert.sh --check
