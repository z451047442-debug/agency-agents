name: Nightly Full Audit

on:
  schedule:
    - cron: "37 2 * * *"  # nightly at 02:37 UTC
  workflow_dispatch:

jobs:
  audit:
    name: Full Audit (Score + Duplicates + Dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate AGENTS.json index
        run: bash scripts/generate-index.sh

      - name: Quality scoring
        run: bash scripts/score-agents.sh

      - name: Duplicate detection
        run: bash scripts/check-dupes.sh --threshold 0.90

      - name: Dependency validation
        run: bash scripts/check-deps.sh

  originality:
    name: Originality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run originality check on changed agents
        run: bash scripts/check-agent-originality.sh
